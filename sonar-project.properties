# sonar-project.properties
sonar.projectKey=amd-khalid
sonar.organization=amd-khalid

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Vulnerable Corp App
sonar.projectVersion=1.0

# Only scan application source code, NOT test files
sonar.sources=app.py

# Tell SonarQube which files are tests
sonar.tests=test_security_baseline.py
sonar.test.inclusions=test_*.py

sonar.language=py
sonar.python.version=3.9

# Exclude test files from coverage measurement and non-Python files from scanning
sonar.exclusions=**/requirements.txt,**/*.html
sonar.coverage.exclusions=test_*.py

# Path to the coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml