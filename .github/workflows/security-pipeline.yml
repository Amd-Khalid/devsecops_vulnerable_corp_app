name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]



jobs:
  sast-sonarqube:
    name: SAST Scan (SonarQube Cloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones disabled for better analysis relevancy
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # 2. Install dependencies (Flask, Werkzeug, plus Pytest)
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
          
      # 3. Run the Regression Tests to generate coverage.xml
      - name: Run Regression Tests and Coverage
        run: |
          pytest test_security_baseline.py --cov=app --cov-report=xml
          
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # You must add this in GitHub Secrets

  sca-sbom:
    name: SCA Scan (SBOM Generation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate SBOM using Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-report.json
          
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sca-sbom-report
          path: sbom-report.json

  dast-zap:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t vulnerable-app .
        
      - name: Run Docker Container
        # Using --network host bypasses Docker's isolated network 
        # so ZAP can successfully hit localhost:5000
        run: docker run -d --network host vulnerable-app
        
      - name: Wait for application to start
        run: sleep 15 # Increased slightly to ensure the app is fully booted
        
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://172.17.0.1:5000'
          fail_action: false # Set to true later when you want the pipeline to fail on findings
          
      - name: Upload ZAP Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-zap-report
          path: report_html.html