{% extends 'base.html' %}
{% block content %}
    <nav>
        <a href="/dashboard">Back to Dashboard</a>
        <a href="/logout">Logout</a>
    </nav>

    <section class="card">
        <h2>Admin Control Panel</h2>
        <p class="text-muted">Review all registered users and their current roles.</p>
        <div style="overflow-x:auto; margin-top: 18px;">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                        <tr>
                            <td>{{ user['username'] }}</td>
                            <td>{{ user['role'] }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
{% endblock %}
