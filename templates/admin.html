{% extends 'base.html' %}
{% block content %}
    <nav>
        <a href="/dashboard">Back to Dashboard</a>
        <a href="/logout">Logout</a>
    </nav>

    <h2>Admin Control Panel</h2>
    <p>System Users:</p>
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>Username</th>
            <th>Role</th>
        </tr>
        {% for user in users %}
            <tr>
                <td>{{ user['username'] }}</td>
                <td>{{ user['role'] }}</td>
            </tr>
        {% endfor %}
    </table>
{% endblock %}
