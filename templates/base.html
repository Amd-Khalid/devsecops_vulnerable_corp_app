<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpNet Portal</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #102146;
            background: #eef2ff;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; }
        body {
            margin: 0;
            background: radial-gradient(circle at top left, rgba(59,130,246,0.2), transparent 28%),
                        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            color: #17213c;
        }
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px 48px;
        }
        .container {
            width: min(100%, 1040px);
            background: rgba(255,255,255,0.94);
            border: 1px solid rgba(148,163,184,0.18);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(15,23,42,0.12);
            padding: 32px;
        }
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 24px;
        }
        .brand {
            margin: 0;
            font-size: 1.45rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #2563eb;
        }
        .subtitle {
            margin: 0.35rem 0 0;
            color: #475569;
            font-size: 0.95rem;
        }
        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(148,163,184,0.25);
        }
        nav a {
            color: #334155;
            text-decoration: none;
            background: rgba(59,130,246,0.08);
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }
        nav a:hover {
            background: rgba(37,99,235,0.18);
            color: #1d4ed8;
            transform: translateY(-1px);
        }
        h1, h2, h3 {
            color: #0f172a;
            margin-top: 0;
        }
        .card {
            background: #ffffff;
            border: 1px solid rgba(148,163,184,0.18);
            border-radius: 22px;
            box-shadow: 0 14px 40px rgba(15,23,42,0.08);
            padding: 26px;
            margin-bottom: 22px;
        }
        .card-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            min-height: 44px;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            background: #f8fafc;
            color: #0f172a;
            font: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        textarea { min-height: 130px; resize: vertical; }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
        }
        button, .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 14px;
            background: #2563eb;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        button:hover, .button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .button.secondary {
            background: #e2e8f0;
            color: #0f172a;
        }
        .button.secondary:hover {
            background: #cbd5e1;
        }
        .alert {
            background: #ffe4e6;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 22px;
        }
        .text-muted {
            color: #64748b;
            font-size: 0.95rem;
        }
        form.search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        form.search-bar input {
            flex: 1 1 270px;
            min-width: 180px;
        }
        form.search-bar a {
            color: #475569;
            text-decoration: none;
            font-weight: 600;
        }
        ul.post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 16px;
        }
        .post-item {
            background: #f8fafc;
            border: 1px solid rgba(148,163,184,0.22);
            border-radius: 20px;
            padding: 20px;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
        }
        .post-header strong {
            color: #0f172a;
        }
        .post-meta {
            color: #475569;
            font-size: 0.92rem;
        }
        .post-actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            font-size: 0.95rem;
        }
        .post-actions a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .post-actions a.danger { color: #dc2626; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 18px;
            overflow: hidden;
        }
        th, td {
            padding: 16px 18px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f8fafc;
            color: #0f172a;
            text-align: left;
            font-weight: 700;
        }
        tbody tr:last-child td { border-bottom: none; }
        .empty-state {
            margin: 0;
            color: #475569;
            line-height: 1.6;
        }
        @media (max-width: 720px) {
            .page { padding: 20px 12px 36px; }
            nav { justify-content: center; }
            table, th, td { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="container">
            <header>
                <div>
                    <p class="brand">CorpNet</p>
                    <p class="subtitle">A cleaner company portal for posts, search, and admin access.</p>
                </div>
            </header>
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
