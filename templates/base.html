<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpNet Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #003d82;
            background: #f0f7fc;
            --bg: #f0f7fc;
            --surface: #ffffff;
            --surface-alt: #e8f2f8;
            --border: #d0e4f0;
            --text: #003d82;
            --text-secondary: #1a5a8a;
            --text-tertiary: #4a7a9a;
            --primary: #0078b6;
            --primary-hover: #005a8a;
            --primary-light: #c0e0f0;
            --primary-lighter: #e8f4fa;
            --accent: #20b2aa;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --error: #dc2626;
            --error-dark: #991b1b;
            --success: #16a34a;
            --success-light: #dcfce7;
            --shadow-sm: 0 1px 2px rgba(0, 61, 130, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 61, 130, 0.07);
            --shadow-lg: 0 10px 15px rgba(0, 61, 130, 0.1);
            --shadow-xl: 0 20px 25px rgba(0, 61, 130, 0.12);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; font-size: 16px; }
        body {
            background: linear-gradient(135deg, var(--bg) 0%, #f0f4f8 100%);
            color: var(--text);
            line-height: 1.6;
        }
        .page {
            min-height: 100vh;
            padding: 32px 20px 48px;
        }
        .container {
            width: min(100%, 1200px);
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        .shell-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to right, var(--surface), var(--surface-alt));
        }
        .brand {
            margin: 0;
            display: flex;
            align-items: center;
            filter: none;
        }
        .brand img {
            height: 80px;
            width: auto;
            filter: none;
        }
        .subtitle {
            margin: 4px 0 0;
            color: var(--text-tertiary);
            font-size: 0.88rem;
            font-weight: 500;
        }
        .shell-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .shell-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all var(--transition);
            border: 1px solid transparent;
        }
        .shell-nav a:hover {
            background: var(--primary-lighter);
            color: var(--primary);
            border-color: var(--primary-light);
        }
        .shell-nav a.active {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary-light);
        }
        .shell-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .logout-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
            background: var(--primary);
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
            border: 1px solid transparent;
        }
        .logout-link:hover {
            background: var(--primary-hover);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        .logout-link:active {
            transform: translateY(0);
        }
        h1, h2, h3, h4, h5, h6 {
            color: var(--text);
            margin-top: 0;
            letter-spacing: -0.02em;
            font-weight: 700;
        }
        h1 { font-size: 2rem; line-height: 1.2; }
        h2 { font-size: 1.5rem; line-height: 1.3; margin-bottom: 0.5rem; }
        h3 { font-size: 1.25rem; line-height: 1.4; margin-bottom: 0.75rem; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 28px;
            margin-bottom: 24px;
            transition: all var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        .card-grid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            min-height: 44px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--surface-alt);
            color: var(--text);
            font: inherit;
            transition: all var(--transition);
            font-size: 1rem;
        }
        input[type="text"]::placeholder, 
        input[type="password"]::placeholder, 
        textarea::placeholder {
            color: var(--text-tertiary);
        }
        textarea { 
            min-height: 140px; 
            resize: vertical;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px var(--primary-lighter);
        }
        button, .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        button:hover, .button:hover {
            background: var(--primary-hover);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        button:active, .button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .button.secondary {
            background: var(--surface-alt);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: none;
        }
        .button.secondary:hover {
            background: #e8eef7;
            border-color: var(--primary);
        }
        .button.danger {
            background: var(--danger);
        }
        .button.danger:hover {
            background: #b91c1c;
        }
        .alert {
            background: var(--danger-light);
            color: #7f1d1d;
            border: 1px solid #fca5a5;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .alert.success {
            background: var(--success-light);
            color: #15803d;
            border-color: #86efac;
        }
        .text-muted {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .content {
            padding: 32px;
        }
        form.search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        form.search-bar input {
            flex: 1 1 300px;
            min-width: 200px;
        }
        form.search-bar button {
            padding: 12px 24px;
        }
        ul.post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 16px;
        }
        .post-item {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            transition: all var(--transition);
        }
        .post-item:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-md);
        }
        .post-item strong {
            color: var(--text);
            font-weight: 700;
        }
        .post-content {
            margin: 12px 0;
            color: var(--text);
            line-height: 1.6;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .post-meta {
            color: var(--text-tertiary);
            font-size: 0.88rem;
        }
        .post-actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.9rem;
        }
        .post-actions a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all var(--transition);
        }
        .post-actions a:hover {
            background: var(--primary-lighter);
            color: var(--primary-hover);
        }
        .post-actions a.danger { 
            color: var(--danger);
        }
        .post-actions a.danger:hover {
            background: var(--danger-light);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
        }
        th {
            background: var(--surface-alt);
            color: var(--text);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--border);
        }
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }
        tbody tr:last-child {
            border-bottom: none;
        }
        tbody tr:hover {
            background: var(--surface-alt);
        }
        td {
            color: var(--text);
        }
        .empty-state {
            margin: 0;
            color: var(--text-secondary);
            line-height: 1.6;
            text-align: center;
            padding: 40px 20px;
        }
        .hero-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 28px;
            align-items: stretch;
            margin-bottom: 32px;
        }
        .hero-panel {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow-md);
        }
        .hero-panel.compact {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0 0 16px;
            padding: 6px 12px;
            border-radius: 8px;
            background: var(--primary-lighter);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .hero-title {
            margin: 0 0 12px;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            line-height: 1.1;
            letter-spacing: -0.03em;
        }
        .hero-copy {
            margin: 0;
            max-width: 65ch;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .dashboard-grid {
            display: grid;
            gap: 28px;
            grid-template-columns: 1fr 1fr;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 14px;
            margin-top: 24px;
        }
        .stat {
            border-radius: 12px;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            text-align: center;
            transition: all var(--transition);
        }
        .stat:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }
        .stat strong {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 4px;
            color: var(--primary);
        }
        .stat span {
            color: var(--text-tertiary);
            font-size: 0.85rem;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .page { padding: 20px 16px 32px; }
            .container { border-radius: 16px; }
            .shell-header {
                padding: 20px 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            .shell-nav {
                width: 100%;
                justify-content: flex-start;
            }
            .shell-actions {
                width: 100%;
            }
            .content { padding: 20px; }
            .hero-layout, .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .hero-panel { padding: 24px; }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="shell-header">
                <div>
                    <p class="brand"><img src="{{ url_for('static', filename='Logo.png') }}" alt="CorpNet Logo"></p>
                    <p class="subtitle">Internal workspace for updates, moderation, and account management.</p>
                </div>
                {% if session.get('username') %}
                    <nav class="shell-nav" aria-label="Primary">
                        <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
                        {% if session.get('role') == 'admin' %}
                            <a href="/admin" class="{% if request.path == '/admin' %}active{% endif %}">Admin Panel</a>
                        {% endif %}
                    </nav>
                    <div class="shell-actions">
                        <a href="/logout" class="logout-link">Logout</a>
                    </div>
                {% endif %}
            </header>
            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
